version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: wfm_portal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wfm
      POSTGRES_PASSWORD: wfmpassword
      POSTGRES_DB: wfm_request_portal
    ports:
      - "5432:5432"
    volumes:
      - wfm_portal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wfm -d wfm_request_portal"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wfm_portal_pgdata:
